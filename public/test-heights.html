<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Height Test</title>
<style>
  body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
  .test { margin: 20px 0; padding: 20px; background: white; border-radius: 8px; }
  .test label { display: block; margin-bottom: 4px; font-size: 12px; color: #666; }
</style>
</head>
<body>
<h2>Button vs Input Height Test</h2>

<div class="test">
  <label>Input (h-12 = 48px)</label>
  <input style="height: 48px; width: 100%; border: 2px solid #ccc; border-radius: 14px; padding: 0 14px; font-size: 16px;" value="09121234567" readonly>
</div>

<div class="test">
  <label>Button (h-12 = 48px)</label>
  <button style="height: 48px; width: 100%; background: #1A1A1A; color: white; border: none; border-radius: 9999px; font-size: 14px; font-weight: 600; cursor: pointer;">ادامه</button>
</div>

<div class="test">
  <label>Button disabled (h-12 = 48px)</label>
  <button disabled style="height: 48px; width: 100%; background: #ccc; color: white; border: none; border-radius: 9999px; font-size: 14px; font-weight: 600; cursor: not-allowed;">ادامه</button>
</div>

<div class="test">
  <label>PinInput box (48x48)</label>
  <div style="display: flex; gap: 12px; justify-content: center;">
    <input style="width: 48px; height: 48px; border: 2px solid #ccc; border-radius: 12px; text-align: center; font-size: 18px; font-weight: 700;" maxlength="1" readonly>
    <input style="width: 48px; height: 48px; border: 2px solid #ccc; border-radius: 12px; text-align: center; font-size: 18px; font-weight: 700;" maxlength="1" readonly>
    <input style="width: 48px; height: 48px; border: 2px solid #ccc; border-radius: 12px; text-align: center; font-size: 18px; font-weight: 700;" maxlength="1" readonly>
    <input style="width: 48px; height: 48px; border: 2px solid #ccc; border-radius: 12px; text-align: center; font-size: 18px; font-weight: 700;" maxlength="1" readonly>
  </div>
</div>

<p style="margin-top: 20px; font-size: 12px; color: #999;">All elements should be exactly 48px tall. If they look different, it's a browser rendering issue.</p>
</body>
</html>
