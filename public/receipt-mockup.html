<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Receipt — Forehand Nail Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #e5e2dd;
      --paper: #f2f0ec;
      --blue-2: #5bb3e4;
      --blue-4: #2888d0;
      --teal: #4cc0b0;
      --green: #22c55e;
      --ink: #2a2a2a;
      --ink-mid: #6a6a6a;
      --ink-faint: #9a9a9a;
    }

    html {
      font-family: 'Vazirmatn', -apple-system, sans-serif;
      direction: rtl;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    /* Surface grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='s'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23s)' opacity='0.2'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.06;
      mix-blend-mode: multiply;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 70% 60% at center, transparent 0%, rgba(0,0,0,0.05) 100%);
    }

    .receipt-wrapper {
      width: 100%;
      max-width: 340px;
      position: relative;
    }

    /* Paper texture */
    .paper-tex {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      border-radius: inherit;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.25'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.05;
      mix-blend-mode: multiply;
    }

    /* ═══ TOP STUB ═══ */
    .stub {
      position: relative;
      z-index: 2;
      margin-bottom: -1px;
    }

    .stub-body {
      background: var(--paper);
      border-radius: 10px 10px 0 0;
      padding: 18px 24px 10px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0.5px 1px rgba(80,70,60,0.08),
        0 2px 6px rgba(60,50,40,0.06),
        0 4px 12px rgba(50,40,30,0.04);
    }

    .stub-body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    }

    .barcode {
      display: flex;
      justify-content: center;
      gap: 1.5px;
      height: 28px;
      align-items: flex-end;
      margin-bottom: 6px;
      position: relative;
      z-index: 2;
    }

    .barcode .bar {
      background: var(--ink);
      border-radius: 0.5px;
      opacity: 0.1;
    }

    .stub-label {
      text-align: center;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--ink-faint);
      opacity: 0.4;
      position: relative;
      z-index: 2;
    }

    .stub-url {
      text-align: center;
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--ink-faint);
      opacity: 0.3;
      position: relative;
      z-index: 2;
      margin-top: 2px;
    }

    /* Torn edge */
    .tear {
      height: 5px;
      background: var(--paper);
      position: relative;
      z-index: 2;
      overflow: hidden;
    }

    .tear::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: repeating-conic-gradient(var(--paper) 0% 25%, transparent 0% 50%) 50% / 8px 8px;
    }

    /* ═══ PERFORATION ═══ */
    .perf {
      display: flex;
      justify-content: center;
      gap: 7px;
      padding: 4px 0;
      position: relative;
      z-index: 3;
    }

    .perf-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--bg);
      box-shadow: inset 0 0.5px 1px rgba(0,0,0,0.08);
    }

    /* ═══ MAIN CARD ═══ */
    .main-card {
      position: relative;
      z-index: 1;
    }

    .main-body {
      background: var(--paper);
      border-radius: 0 0 10px 10px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0.5px 1px rgba(80,70,60,0.06),
        0 2px 6px rgba(60,50,40,0.05),
        0 4px 12px rgba(50,40,30,0.04),
        0 8px 24px rgba(50,40,30,0.03),
        0 16px 48px rgba(50,40,30,0.02);
    }

    .main-body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    }

    /* ═══ FOREHAND WATERMARK ═══ */
    .watermark {
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--ink);
      opacity: 0.03;
      z-index: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    /* ═══ SUCCESS HEADER ═══ */
    .success {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }

    .success-check {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 12px rgba(34,197,94,0.25);
    }

    .success-check svg {
      width: 22px;
      height: 22px;
      color: white;
      stroke-width: 2.5;
    }

    .success-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--ink);
    }

    .success-sub {
      font-size: 12px;
      color: var(--ink-mid);
      margin-top: 1px;
    }

    /* ═══ DIVIDER ═══ */
    .divider {
      height: 1px;
      background: rgba(0,0,0,0.04);
      margin-bottom: 16px;
      position: relative;
      z-index: 2;
    }

    /* ═══ BOOKING INFO ═══ */
    .booking-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      position: relative;
      z-index: 2;
    }

    .booking-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      background: linear-gradient(135deg, rgba(40,136,208,0.08), rgba(91,179,228,0.04));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .booking-icon svg {
      width: 18px;
      height: 18px;
      color: var(--blue-4);
    }

    .booking-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
    }

    .booking-salon {
      font-size: 11px;
      color: var(--ink-faint);
      margin-top: 1px;
    }

    /* ═══ DETAIL LIST (classic receipt) ═══ */
    .detail-list {
      position: relative;
      z-index: 2;
      margin-bottom: 16px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
    }

    .detail-row + .detail-row {
      border-top: 1px dashed rgba(0,0,0,0.06);
    }

    .detail-label {
      font-size: 13px;
      color: var(--ink-mid);
      font-weight: 400;
    }

    .detail-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .detail-value.price {
      font-size: 18px;
      font-weight: 800;
      color: var(--blue-4);
    }

    /* ═══ ACTIONS ═══ */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      min-height: 48px;
    }

    .btn svg { width: 16px; height: 16px; }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue-2), var(--blue-4));
      color: white;
      box-shadow: 0 2px 8px rgba(40,136,208,0.2);
    }

    .btn-primary:hover { box-shadow: 0 4px 16px rgba(40,136,208,0.3); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-outline {
      background: white;
      color: var(--ink);
      border: 1px solid rgba(0,0,0,0.08);
    }

    .btn-outline:hover { background: #fafafa; }
    .btn-outline:active { background: #f5f5f5; }
  </style>
</head>
<body>

  <div class="receipt-wrapper">

    <!-- ═══ TOP STUB ═══ -->
    <div class="stub">
      <div class="stub-body">
        <div class="paper-tex"></div>
        <div class="barcode" id="barcode"></div>
        <div class="stub-label">#A3F7</div>
        <div class="stub-url">forehand.vercel.app</div>
      </div>
      <div class="tear"></div>
    </div>

    <!-- ═══ PERFORATION ═══ -->
    <div class="perf" id="perf"></div>

    <!-- ═══ MAIN CARD ═══ -->
    <div class="main-card">
      <div class="tear" style="border-radius: 0; transform: rotate(180deg);"></div>
      <div class="main-body">
        <div class="paper-tex"></div>

        <!-- FOREHAND watermark — big, bold, rotated, low opacity -->
        <div class="watermark">FOREHAND</div>

        <!-- Success header — inside card -->
        <div class="success">
          <div class="success-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div>
            <div class="success-title">رزرو ثبت شد!</div>
            <div class="success-sub">نوبت شما با موفقیت ثبت شد</div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Booking info -->
        <div class="booking-info">
          <div class="booking-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
            </svg>
          </div>
          <div>
            <div class="booking-name">ژل پولیش ناخن</div>
            <div class="booking-salon">فورهند نیل استودیو</div>
          </div>
        </div>

        <!-- Detail list — classic receipt style -->
        <div class="detail-list">
          <div class="detail-row">
            <span class="detail-label">خدمت</span>
            <span class="detail-value">ژل پولیش ناخن</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">تاریخ</span>
            <span class="detail-value">۲۹ تیر ۱۴۰۵</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">ساعت</span>
            <span class="detail-value">۱۰:۳۰ - ۱۱:۳۰</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">مدت</span>
            <span class="detail-value">۶۰ دقیقه</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">هزینه کل</span>
            <span class="detail-value price">۴۵۰,۰۰۰ تومان</span>
          </div>
        </div>

      </div>
    </div>

    <!-- ═══ ACTIONS ═══ -->
    <div class="actions">
      <button class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        تقویم گوگل
      </button>
      <button class="btn btn-outline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/>
          <circle cx="6" cy="12" r="3"/>
          <circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        اشتراک‌گذاری
      </button>
    </div>

  </div>

  <script>
    // Barcode
    const barcode = document.getElementById('barcode');
    [2,1,3,1,2,1,1,3,1,2,1,3,1,1,2,1,3,1,2,1,1,3,1,2,1,3,1,2,1,1,3,1,2,1,3,1,1,2,1,3,1,2,1,1,3,1,2,1,3,1,2,1,1,3,1,2,1,3,1,1,2,1].forEach(w => {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.width = w + 'px';
      bar.style.height = (22 + Math.random() * 6) + 'px';
      barcode.appendChild(bar);
    });

    // Perforation dots
    const perf = document.getElementById('perf');
    for (let i = 0; i < 26; i++) {
      const dot = document.createElement('div');
      dot.className = 'perf-dot';
      perf.appendChild(dot);
    }
  </script>

</body>
</html>
