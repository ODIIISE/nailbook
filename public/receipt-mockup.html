<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Mockup — Forehand Nail Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #e5e2dd;
      --paper: #f2f0ec;
      --blue-1: #8ecfea;
      --blue-2: #5bb3e4;
      --blue-3: #3a9de0;
      --blue-4: #2888d0;
      --teal: #4cc0b0;
      --ink: #2a2a2a;
      --ink-mid: #6a6a6a;
      --ink-faint: #9a9a9a;
    }

    html {
      font-family: 'Vazirmatn', -apple-system, sans-serif;
      direction: rtl;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 70% 60% at center, transparent 0%, rgba(0,0,0,0.06) 100%);
    }

    /* ═══════════════════════════════
       RECEIPT CONTAINER
    ═══════════════════════════════ */
    .receipt {
      width: 100%;
      max-width: 360px;
      position: relative;
    }

    /* ═══════════════════════════════
       TOP STUB (detached ticket piece)
    ═══════════════════════════════ */
    .stub {
      position: relative;
      z-index: 2;
      margin-bottom: -3px;
      transform: rotate(-1deg);
      transform-origin: right center;
    }

    .stub-paper {
      background: var(--paper);
      border-radius: 12px 12px 0 0;
      padding: 20px 24px 10px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 1px 2px rgba(80,70,60,0.08),
        0 3px 8px rgba(60,50,40,0.06),
        0 8px 20px rgba(50,40,30,0.05);
    }

    /* Paper grain */
    .stub-paper::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.3'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.06;
      mix-blend-mode: multiply;
    }

    /* Light catch */
    .stub-paper::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    }

    /* Barcode */
    .barcode {
      display: flex;
      justify-content: center;
      gap: 1.5px;
      height: 32px;
      align-items: flex-end;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .barcode .bar {
      background: var(--ink);
      border-radius: 0.5px;
      opacity: 0.12;
    }

    .stub-label {
      text-align: center;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--ink-faint);
      opacity: 0.5;
      position: relative;
      z-index: 1;
    }

    /* Torn edge — stub bottom */
    .stub-tear {
      height: 6px;
      background: var(--paper);
      mask-image: url("data:image/svg+xml,%3Csvg width='100' height='6' viewBox='0 0 100 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0 L100 0 L100 6 L0 6 Z' fill='white'/%3E%3Ccircle cx='5' cy='6' r='3' fill='black'/%3E%3Ccircle cx='15' cy='6' r='3' fill='black'/%3E%3Ccircle cx='25' cy='6' r='3' fill='black'/%3E%3Ccircle cx='35' cy='6' r='3' fill='black'/%3E%3Ccircle cx='45' cy='6' r='3' fill='black'/%3E%3Ccircle cx='55' cy='6' r='3' fill='black'/%3E%3Ccircle cx='65' cy='6' r='3' fill='black'/%3E%3Ccircle cx='75' cy='6' r='3' fill='black'/%3E%3Ccircle cx='85' cy='6' r='3' fill='black'/%3E%3Ccircle cx='95' cy='6' r='3' fill='black'/%3E%3C/svg%3E");
      -webkit-mask-image: url("data:image/svg+xml,%3Csvg width='100' height='6' viewBox='0 0 100 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0 L100 0 L100 6 L0 6 Z' fill='white'/%3E%3Ccircle cx='5' cy='6' r='3' fill='black'/%3E%3Ccircle cx='15' cy='6' r='3' fill='black'/%3E%3Ccircle cx='25' cy='6' r='3' fill='black'/%3E%3Ccircle cx='35' cy='6' r='3' fill='black'/%3E%3Ccircle cx='45' cy='6' r='3' fill='black'/%3E%3Ccircle cx='55' cy='6' r='3' fill='black'/%3E%3Ccircle cx='65' cy='6' r='3' fill='black'/%3E%3Ccircle cx='75' cy='6' r='3' fill='black'/%3E%3Ccircle cx='85' cy='6' r='3' fill='black'/%3E%3Ccircle cx='95' cy='6' r='3' fill='black'/%3E%3C/svg%3E");
      mask-size: 100px 6px;
      -webkit-mask-size: 100px 6px;
      mask-repeat: repeat-x;
      -webkit-mask-repeat: repeat-x;
      position: relative;
      z-index: 2;
    }

    /* ═══════════════════════════════
       MAIN CARD
    ═══════════════════════════════ */
    .main-card {
      position: relative;
      z-index: 1;
    }

    .main-paper {
      background: var(--paper);
      border-radius: 0 0 12px 12px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 1px 2px rgba(80,70,60,0.06),
        0 2px 6px rgba(60,50,40,0.05),
        0 4px 12px rgba(50,40,30,0.04),
        0 8px 24px rgba(50,40,30,0.03),
        0 16px 48px rgba(50,40,30,0.02);
    }

    /* Paper grain */
    .main-paper::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n2)' opacity='0.3'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.06;
      mix-blend-mode: multiply;
    }

    /* Light catch */
    .main-paper::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    }

    /* Torn edge — main top */
    .main-tear {
      height: 6px;
      background: var(--paper);
      mask-image: url("data:image/svg+xml,%3Csvg width='100' height='6' viewBox='0 0 100 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 6 L100 6 L100 0 L0 0 Z' fill='white'/%3E%3Ccircle cx='5' cy='0' r='3' fill='black'/%3E%3Ccircle cx='15' cy='0' r='3' fill='black'/%3E%3Ccircle cx='25' cy='0' r='3' fill='black'/%3E%3Ccircle cx='35' cy='0' r='3' fill='black'/%3E%3Ccircle cx='45' cy='0' r='3' fill='black'/%3E%3Ccircle cx='55' cy='0' r='3' fill='black'/%3E%3Ccircle cx='65' cy='0' r='3' fill='black'/%3E%3Ccircle cx='75' cy='0' r='3' fill='black'/%3E%3Ccircle cx='85' cy='0' r='3' fill='black'/%3E%3Ccircle cx='95' cy='0' r='3' fill='black'/%3E%3C/svg%3E");
      -webkit-mask-image: url("data:image/svg+xml,%3Csvg width='100' height='6' viewBox='0 0 100 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 6 L100 6 L100 0 L0 0 Z' fill='white'/%3E%3Ccircle cx='5' cy='0' r='3' fill='black'/%3E%3Ccircle cx='15' cy='0' r='3' fill='black'/%3E%3Ccircle cx='25' cy='0' r='3' fill='black'/%3E%3Ccircle cx='35' cy='0' r='3' fill='black'/%3E%3Ccircle cx='45' cy='0' r='3' fill='black'/%3E%3Ccircle cx='55' cy='0' r='3' fill='black'/%3E%3Ccircle cx='65' cy='0' r='3' fill='black'/%3E%3Ccircle cx='75' cy='0' r='3' fill='black'/%3E%3Ccircle cx='85' cy='0' r='3' fill='black'/%3E%3Ccircle cx='95' cy='0' r='3' fill='black'/%3E%3C/svg%3E");
      mask-size: 100px 6px;
      -webkit-mask-size: 100px 6px;
      mask-repeat: repeat-x;
      -webkit-mask-repeat: repeat-x;
      position: relative;
      z-index: 2;
      margin-bottom: -1px;
    }

    /* ═══════════════════════════════
       CONTENT SECTIONS
    ═══════════════════════════════ */
    .service-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 20px;
      border-bottom: 1px dashed rgba(0,0,0,0.06);
      position: relative;
      z-index: 1;
    }

    .service-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(40,136,208,0.08), rgba(91,179,228,0.05));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .service-icon svg {
      width: 24px;
      height: 24px;
      color: var(--blue-4);
    }

    .service-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .service-salon {
      font-size: 12px;
      color: var(--ink-mid);
    }

    .service-badge {
      font-size: 10px;
      font-weight: 600;
      color: #28a745;
      background: rgba(40,167,69,0.08);
      padding: 3px 8px;
      border-radius: 6px;
    }

    /* Details */
    .details {
      padding: 16px 0;
      position: relative;
      z-index: 1;
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
    }

    .detail-row + .detail-row {
      border-top: 1px solid rgba(0,0,0,0.03);
    }

    .detail-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .detail-icon svg {
      width: 16px;
      height: 16px;
    }

    .detail-icon.blue { background: rgba(40,136,208,0.08); color: var(--blue-4); }
    .detail-icon.teal { background: rgba(76,192,176,0.08); color: var(--teal); }
    .detail-icon.purple { background: rgba(147,51,234,0.08); color: #9333ea; }

    .detail-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
    }

    .detail-sub {
      font-size: 11px;
      color: var(--ink-faint);
      margin-top: 1px;
    }

    /* Total */
    .total-section {
      border-top: 2px dashed rgba(0,0,0,0.06);
      padding-top: 16px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .total-label {
      font-size: 13px;
      color: var(--ink-mid);
      font-weight: 500;
    }

    .total-amount {
      font-size: 22px;
      font-weight: 800;
      color: var(--ink);
    }

    .total-currency {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-faint);
    }

    /* ═══════════════════════════════
       SUCCESS HEADER
    ═══════════════════════════════ */
    .success-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .success-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(40,167,69,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      position: relative;
    }

    .success-icon svg {
      width: 36px;
      height: 36px;
      color: #28a745;
    }

    .success-icon::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(40,167,69,0.15);
      animation: ping 2s infinite;
    }

    @keyframes ping {
      0% { transform: scale(1); opacity: 1; }
      75%, 100% { transform: scale(1.3); opacity: 0; }
    }

    .success-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 100px;
      background: rgba(40,167,69,0.08);
      border: 1px solid rgba(40,167,69,0.15);
      font-size: 14px;
      font-weight: 700;
      color: #28a745;
    }

    .success-text {
      font-size: 13px;
      color: var(--ink-mid);
      margin-top: 8px;
    }

    /* ═══════════════════════════════
       BUTTONS
    ═══════════════════════════════ */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue-2), var(--blue-4));
      color: white;
      box-shadow:
        0 2px 4px rgba(40,136,208,0.12),
        0 4px 12px rgba(40,136,208,0.18);
    }

    .btn-primary:hover {
      box-shadow:
        0 3px 6px rgba(40,136,208,0.15),
        0 6px 18px rgba(40,136,208,0.22);
      transform: translateY(-1px);
    }

    .btn-outline {
      background: white;
      color: var(--ink);
      border: 1px solid rgba(0,0,0,0.08);
    }

    .btn-outline:hover {
      background: #fafafa;
    }

    /* ═══════════════════════════════
       SIDE TEXT (Samsung style)
    ═══════════════════════════════ */
    .side-text {
      position: absolute;
      left: -4px;
      top: 40%;
      transform: translateY(-50%) rotate(-90deg);
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--ink-faint);
      opacity: 0.25;
      white-space: nowrap;
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="receipt">
    <!-- ═══ SUCCESS HEADER ═══ -->
    <div class="success-header">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <div class="success-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        رزرو ثبت شد
      </div>
      <p class="success-text">نوبت شما با موفقیت ثبت شد</p>
    </div>

    <!-- ═══ TOP STUB ═══ -->
    <div class="stub">
      <div class="stub-paper">
        <div class="barcode" id="barcode"></div>
        <div class="stub-label">#A3F7</div>
      </div>
      <div class="stub-tear"></div>
    </div>

    <!-- ═══ MAIN CARD ═══ -->
    <div class="main-card">
      <div class="main-tear"></div>
      <div class="main-paper">
        <div class="side-text">BOOKING CONFIRMED</div>

        <!-- Service Header -->
        <div class="service-header">
          <div class="service-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
            </svg>
          </div>
          <div style="flex:1">
            <div class="service-name">ژل پولیش ناخن</div>
            <div class="service-salon">استودیو تخصصی ناخن فورهند</div>
          </div>
          <div class="service-badge">ثبت شده</div>
        </div>

        <!-- Details -->
        <div class="details">
          <div class="detail-row">
            <div class="detail-icon blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            <div style="flex:1">
              <div class="detail-value">۲۹ تیر ۱۴۰۵</div>
              <div class="detail-sub">ساعت ۱۰:۳۰ تا ۱۱:۳۰</div>
            </div>
          </div>

          <div class="detail-row">
            <div class="detail-icon teal">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <div class="detail-value">۶۰ دقیقه</div>
          </div>

          <div class="detail-row">
            <div class="detail-icon purple">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="1" x2="12" y2="23"/>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
            </div>
            <div style="flex:1">
              <div class="detail-value">۴۵۰,۰۰۰ تومان</div>
              <div class="detail-sub">هزینه کل</div>
            </div>
          </div>
        </div>

        <!-- Total -->
        <div class="total-section">
          <span class="total-label">هزینه کل</span>
          <span>
            <span class="total-amount">۴۵۰,۰۰۰</span>
            <span class="total-currency">تومان</span>
          </span>
        </div>
      </div>
    </div>

    <!-- ═══ ACTIONS ═══ -->
    <div class="actions">
      <button class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        تقویم گوگل
      </button>
      <button class="btn btn-outline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/>
          <circle cx="6" cy="12" r="3"/>
          <circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        اشتراک‌گذاری
      </button>
    </div>
  </div>

  <script>
    // Generate barcode
    const barcode = document.getElementById('barcode');
    [2,1,3,1,2,1,1,3,1,2,1,3,1,1,2,1,3,1,2,1,1,3,1,2,1,3,1,2,1,1,3,1,2,1,3,1,1,2,1,3,1,2,1,1,3,1,2,1,3,1,2,1,1,3,1,2,1,3,1,1,2,1,3,1,2,1].forEach(w => {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.width = w + 'px';
      bar.style.height = (26 + Math.random() * 6) + 'px';
      barcode.appendChild(bar);
    });
  </script>

</body>
</html>
