<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Modal v4 — Compact</title>
  <link href="https://cdn.jsdelivr.net/gh/rastadfar/rastadfar-fonts@main/Vazirmatn/vazirmatn.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Vazirmatn', -apple-system, sans-serif;
      background: #F8F6F4;
      color: #2C2424;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .modal {
      width: 340px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(24px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }

    /* ─── Header ─── */

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h2 { font-size: 16px; font-weight: 700; }

    .header-id {
      font-size: 10px;
      font-weight: 600;
      color: #7A7068;
      background: rgba(0,0,0,0.04);
      padding: 2px 8px;
      border-radius: 6px;
      font-variant-numeric: tabular-nums;
    }

    .close-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: rgba(0,0,0,0.04);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn svg { width: 14px; height: 14px; color: #7A7068; }

    /* ─── Customer ─── */

    .customer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(0,0,0,0.02);
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .customer-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar svg { width: 16px; height: 16px; color: rgba(0,0,0,0.35); }

    .customer-name { font-size: 13px; font-weight: 700; }
    .customer-phone { font-size: 11px; color: #7A7068; margin-top: 1px; }

    .customer-actions {
      display: flex;
      gap: 4px;
    }

    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.06);
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .action-btn svg { width: 14px; height: 14px; }
    .action-sms svg { color: #7B1FA2; }
    .action-call svg { color: #1565C0; }

    .tooltip-trigger { position: relative; }

    .tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1A1A1A;
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 20;
    }

    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 3px solid transparent;
      border-top-color: #1A1A1A;
    }

    .tooltip-trigger:hover .tooltip { opacity: 1; }

    /* ─── Details ─── */

    .details {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .row:last-child { border-bottom: none; }

    .row-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .row-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .row-icon svg { width: 11px; height: 11px; }

    .ri-service { background: rgba(0,0,0,0.03); color: rgba(0,0,0,0.4); }
    .ri-date { background: rgba(25, 118, 210, 0.08); color: #1976D2; }
    .ri-duration { background: rgba(0,0,0,0.03); color: rgba(0,0,0,0.4); }
    .ri-price { background: rgba(230, 81, 0, 0.08); color: #E65100; }
    .ri-created { background: rgba(0,0,0,0.03); color: rgba(0,0,0,0.3); }

    .row-label { font-size: 12px; color: #7A7068; font-weight: 500; }
    .row-value { font-size: 12px; font-weight: 700; color: #2C2424; }
    .row-value.price { color: #E65100; }
    .row-value.muted { font-weight: 500; color: #7A7068; }

    /* ─── Addons ─── */

    .addon-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0 0 30px;
      flex-wrap: wrap;
    }

    .addon-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 5px;
      background: rgba(123, 31, 162, 0.06);
      font-size: 10px;
      font-weight: 600;
      color: #7B1FA2;
    }

    .addon-chip svg { width: 8px; height: 8px; }

    .addon-more {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 5px;
      background: rgba(0,0,0,0.04);
      font-size: 10px;
      font-weight: 600;
      color: #7A7068;
      cursor: pointer;
      position: relative;
    }

    .addon-more .tooltip { bottom: auto; top: calc(100% + 6px); }
    .addon-more .tooltip::after { top: auto; bottom: 100%; border-top-color: transparent; border-bottom-color: #1A1A1A; }

    /* ─── Status + Payment Row ─── */

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .status-dropdown {
      flex: 1;
      position: relative;
    }

    .status-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      background: white;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: #2C2424;
    }

    .status-trigger-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-trigger svg {
      width: 14px;
      height: 14px;
      color: #7A7068;
      transition: transform 0.2s;
    }

    .status-dropdown.open .status-trigger svg { transform: rotate(180deg); }

    .status-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: white;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      border: 1px solid rgba(0,0,0,0.06);
      overflow: hidden;
      z-index: 10;
      display: none;
    }

    .status-dropdown.open .status-menu { display: block; }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #2C2424;
    }

    .status-item:hover { background: rgba(0,0,0,0.03); }
    .status-item.active { background: rgba(0,0,0,0.04); font-weight: 700; }

    .status-item .item-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .status-item .item-check {
      margin-right: auto;
      width: 14px;
      height: 14px;
      color: #2E7D32;
      opacity: 0;
    }

    .status-item.active .item-check { opacity: 1; }

    /* ─── Payment Toggle ─── */

    .payment {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: rgba(0,0,0,0.02);
      border-radius: 10px;
      flex: 1;
    }

    .payment-label {
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .payment-label svg { width: 13px; height: 13px; color: rgba(0,0,0,0.35); }

    .toggle {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: #E0E0E0;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle.on { background: #2E7D32; }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .toggle.on::after { transform: translateX(-16px); }

    /* ─── Buttons ─── */

    .buttons {
      display: flex;
      gap: 6px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn svg { width: 14px; height: 14px; }

    .btn-delete {
      background: rgba(198, 40, 40, 0.08);
      color: #C62828;
    }

    .btn-delete:hover { background: rgba(198, 40, 40, 0.12); }

    .btn-close {
      background: rgba(0,0,0,0.04);
      color: #2C2424;
    }

    .btn-close:hover { background: rgba(0,0,0,0.06); }
  </style>
</head>
<body>
  <div class="modal">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <h2>جزئیات نوبت</h2>
        <span class="header-id" dir="ltr">BK-8646DA6</span>
      </div>
      <button class="close-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Customer -->
    <div class="customer">
      <div class="customer-left">
        <div class="avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div>
          <div class="customer-name">سارا احمدی</div>
          <div class="customer-phone" dir="ltr">۰۹۱۲۱۲۳۴۵۶۷</div>
        </div>
      </div>
      <div class="customer-actions">
        <div class="tooltip-trigger">
          <button class="action-btn action-sms">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </button>
          <div class="tooltip">پیامک</div>
        </div>
        <div class="tooltip-trigger">
          <button class="action-btn action-call">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </button>
          <div class="tooltip">تماس</div>
        </div>
      </div>
    </div>

    <!-- Details -->
    <div class="details">
      <div class="row">
        <div class="row-left">
          <div class="row-icon ri-service"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
          <span class="row-label">خدمت</span>
        </div>
        <span class="row-value">ژلیش ناخن</span>
      </div>

      <div class="addon-row">
        <span class="addon-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>طراحی ساده</span>
        <span class="addon-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>سنگ ناخن</span>
        <div class="tooltip-trigger">
          <span class="addon-more">+۲</span>
          <div class="tooltip">کروم ناخن، فرنچ رنگی</div>
        </div>
      </div>

      <div class="row">
        <div class="row-left">
          <div class="row-icon ri-date"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
          <span class="row-label">تاریخ و ساعت</span>
        </div>
        <span class="row-value">۲۴ تیر · ۱۴:۰۰ – ۱۴:۴۵</span>
      </div>

      <div class="row">
        <div class="row-left">
          <div class="row-icon ri-duration"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
          <span class="row-label">مدت</span>
        </div>
        <span class="row-value">۴۵ دقیقه</span>
      </div>

      <div class="row">
        <div class="row-left">
          <div class="row-icon ri-price"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
          <span class="row-label">هزینه</span>
        </div>
        <span class="row-value price">۴۰۰,۰۰۰ تومان</span>
      </div>

      <div class="row">
        <div class="row-left">
          <div class="row-icon ri-created"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
          <span class="row-label">ثبت شده</span>
        </div>
        <span class="row-value muted">۲۳ تیر ۱۰:۲۳</span>
      </div>
    </div>

    <!-- Status + Payment -->
    <div class="controls">
      <div class="status-dropdown" id="statusDropdown">
        <button class="status-trigger" onclick="toggleDropdown()">
          <div class="status-trigger-left">
            <div class="status-dot" style="background: #2E7D32;"></div>
            <span>تایید شده</span>
          </div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="status-menu">
          <div class="status-item active" onclick="selectStatus(this, '#2E7D32', 'تایید شده')">
            <div class="item-dot" style="background: #2E7D32;"></div>
            <span>تایید شده</span>
            <svg class="item-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
          </div>
          <div class="status-item" onclick="selectStatus(this, '#1565C0', 'در حال انجام')">
            <div class="item-dot" style="background: #1565C0;"></div>
            <span>در حال انجام</span>
            <svg class="item-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
          </div>
          <div class="status-item" onclick="selectStatus(this, '#7B1FA2', 'تکمیل شده')">
            <div class="item-dot" style="background: #7B1FA2;"></div>
            <span>تکمیل شده</span>
            <svg class="item-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
          </div>
        </div>
      </div>

      <div class="payment">
        <span class="payment-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>
          پرداخت
        </span>
        <div class="toggle"></div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button class="btn btn-delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        حذف نوبت
      </button>
      <button class="btn btn-close">بستن</button>
    </div>
  </div>

  <script>
    function toggleDropdown() { document.getElementById('statusDropdown').classList.toggle('open'); }
    function selectStatus(item, color, label) {
      document.querySelectorAll('.status-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      document.querySelector('.status-dot').style.background = color;
      document.querySelector('.status-trigger-left span').textContent = label;
      toggleDropdown();
    }
    document.querySelectorAll('.toggle').forEach(t => t.addEventListener('click', () => t.classList.toggle('on')));
    document.addEventListener('click', (e) => { if (!e.target.closest('.status-dropdown')) document.getElementById('statusDropdown').classList.remove('open'); });
  </script>
</body>
</html>
